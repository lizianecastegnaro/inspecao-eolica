        /**
         * Cria um backup completo de todos os dados (inspeções + fotos)
         */
        async function createBackup() {
            console.log('=== CRIANDO BACKUP ===');
            
            const backup = {
                version: '2.0',
                createdAt: new Date().toISOString(),
                appName: 'Inspeção de Torres Eólicas - Coxilha Negra (PWA)',
                data: {
                    inspectionData: {},
                    photos: {}
                }
            };

            try {
                // Carregar dados de inspeção do IndexedDB
                backup.data.inspectionData = await loadAllInspectionsFromDB();
                
                // Carregar todas as fotos do IndexedDB
                backup.data.photos = await loadAllPhotosFromDB();
                
            } catch (e) {
                console.error('Erro ao ler dados do IndexedDB:', e);
                // Fallback para localStorage
                const inspectionDataJson = localStorage.getItem('inspectionData');
                if (inspectionDataJson) {
                    backup.data.inspectionData = JSON.parse(inspectionDataJson);
                }
                for (let i = 0; i < localStorage.length; i++) {
                    const key = localStorage.key(i);
                    if (key.startsWith('photos_')) {
                        backup.data.photos[key] = JSON.parse(localStorage.getItem(key));
                    }
                }
            }

            // Estatísticas do backup
            const numInspecoes = Object.keys(backup.data.inspectionData).length;
            const numFotosKeys = Object.keys(backup.data.photos).length;
            let numFotosTotal = 0;
            for (const photos of Object.values(backup.data.photos)) {
                if (Array.isArray(photos)) {
                    numFotosTotal += photos.length;
                }
            }

            console.log(`Backup: ${numInspecoes} inspeções, ${numFotosTotal} fotos`);

            // Criar arquivo e baixar
            const jsonStr = JSON.stringify(backup);
            const blob = new Blob([jsonStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            
            const date = new Date().toISOString().split('T')[0];
            const filename = `backup_inspecao_${date}.json`;
            
            const link = document.createElement('a');
            link.href = url;
            link.download = filename;
            link.click();
            
            URL.revokeObjectURL(url);

            showToast(`✅ Backup criado! ${numInspecoes} inspeções, ${numFotosTotal} fotos`, 'success');
        }

        /**
         * Restaura dados de um arquivo de backup
         */
        async function restoreBackup(file) {
            console.log('=== RESTAURANDO BACKUP ===');
            
            if (!file) {
                showToast('❌ Nenhum arquivo selecionado', 'error');
                return;
            }

            const reader = new FileReader();
            
            reader.onload = async function(e) {
                try {
                    const backup = JSON.parse(e.target.result);
                    
                    // Validar estrutura do backup
                    if (!backup.data || !backup.version) {
                        throw new Error('Arquivo de backup inválido');
                    }

                    // Contar o que será restaurado
                    const numInspecoes = Object.keys(backup.data.inspectionData || {}).length;
                    const numFotosKeys = Object.keys(backup.data.photos || {}).length;
                    let numFotosTotal = 0;
                    for (const photos of Object.values(backup.data.photos || {})) {
                        if (Array.isArray(photos)) {
                            numFotosTotal += photos.length;
                        }
                    }

                    // Confirmar com o usuário
                    const dataBackup = new Date(backup.createdAt).toLocaleString('pt-BR');
                    const confirmMsg = `⚠️ ATENÇÃO!\n\n` +
                        `Você está prestes a restaurar um backup de ${dataBackup}.\n\n` +
                        `Conteúdo do backup:\n` +
                        `• ${numInspecoes} inspeções\n` +
                        `• ${numFotosTotal} fotos\n\n` +
                        `Isso irá SUBSTITUIR todos os dados atuais.\n\n` +
                        `Deseja continuar?`;

                    if (!confirm(confirmMsg)) {
                        showToast('Restauração cancelada', 'info');
                        return;
                    }

                    // Limpar dados atuais do IndexedDB
                    try {
                        await clearAllDB();
                    } catch (e) {
                        console.warn('Erro ao limpar IndexedDB:', e);
                    }

                    // Restaurar dados de inspeção no IndexedDB
                    if (backup.data.inspectionData && Object.keys(backup.data.inspectionData).length > 0) {
                        for (const [key, data] of Object.entries(backup.data.inspectionData)) {
                            await saveInspectionToDB(key, data);
                        }
                        inspectionData = backup.data.inspectionData;
                    }

                    // Restaurar fotos no IndexedDB
                    if (backup.data.photos) {
                        for (const [key, photos] of Object.entries(backup.data.photos)) {
                            if (Array.isArray(photos) && photos.length > 0) {
                                await savePhotosToDB(key, photos);
                            }
                        }
                    }

                    // Atualizar interface
                    await loadSavedData();
                    buildTree();
                    updateProgress();
                    updateParqueProgress();

                    // Recarregar lista de aerogeradores
                    const selectAero = document.getElementById('aerogerador');
                    const currentAero = selectAero.value;
                    selectAero.innerHTML = '<option value="">Selecione o aerogerador...</option>';
                    loadAerogeradores();
                    if (currentAero) {
                        selectAero.value = currentAero;
                    }

                    showToast(`✅ Backup restaurado! ${numInspecoes} inspeções, ${numFotosTotal} fotos`, 'success');
                    console.log('Backup restaurado com sucesso');

                } catch (error) {
                    console.error('Erro ao restaurar backup:', error);
                    showToast('❌ Erro ao ler arquivo de backup: ' + error.message, 'error');
                }
            };

            reader.onerror = function() {
                showToast('❌ Erro ao ler arquivo', 'error');
            };

            reader.readAsText(file);
        }

        async function mergeBackup(file) {
            console.log('=== MESCLANDO BACKUP ===');
            
            if (!file) {
                showToast('❌ Nenhum arquivo selecionado', 'error');
                return;
            }

            const reader = new FileReader();
            
            reader.onload = async function(e) {
                try {
                    const backup = JSON.parse(e.target.result);
                    
                    // Validar estrutura do backup
                    if (!backup.data || !backup.version) {
                        throw new Error('Arquivo de backup inválido');
                    }

                    // Contar o que será mesclado
                    const backupInspections = backup.data.inspectionData || {};
                    const backupPhotos = backup.data.photos || {};
                    const numInspecoesBackup = Object.keys(backupInspections).length;
                    
                    let numFotosBackup = 0;
                    for (const photos of Object.values(backupPhotos)) {
                        if (Array.isArray(photos)) {
                            numFotosBackup += photos.length;
                        }
                    }

                    // Contar dados atuais
                    const numInspecoesAtuais = Object.keys(inspectionData).length;

                    // Confirmar com o usuário
                    const dataBackup = new Date(backup.createdAt).toLocaleString('pt-BR');
                    const confirmMsg = `🔀 MESCLAR BACKUPS\n\n` +
                        `Backup a mesclar (${dataBackup}):\n` +
                        `• ${numInspecoesBackup} inspeções\n` +
                        `• ${numFotosBackup} fotos\n\n` +
                        `Dados atuais:\n` +
                        `• ${numInspecoesAtuais} inspeções\n\n` +
                        `Os dados do backup serão ADICIONADOS aos dados atuais.\n` +
                        `Se houver conflito (mesmo componente nos dois), o dado mais recente será mantido.\n\n` +
                        `Deseja continuar?`;

                    if (!confirm(confirmMsg)) {
                        showToast('Mesclagem cancelada', 'info');
                        return;
                    }

                    let inspecoesAdicionadas = 0;
                    let inspecoesAtualizadas = 0;
                    let fotosAdicionadas = 0;

                    // Mesclar dados de inspeção
                    for (const [key, newData] of Object.entries(backupInspections)) {
                        const existingData = inspectionData[key];
                        
                        if (!existingData) {
                            // Dado não existe, adicionar
                            inspectionData[key] = newData;
                            await saveInspectionToDB(key, newData);
                            inspecoesAdicionadas++;
                        } else {
                            // Dado existe, comparar timestamps se disponíveis
                            const existingTime = existingData.timestamp ? new Date(existingData.timestamp).getTime() : 0;
                            const newTime = newData.timestamp ? new Date(newData.timestamp).getTime() : 0;
                            
                            if (newTime > existingTime) {
                                // Dado do backup é mais recente, atualizar
                                inspectionData[key] = newData;
                                await saveInspectionToDB(key, newData);
                                inspecoesAtualizadas++;
                            }
                            // Se o dado atual é mais recente ou igual, manter o atual
                        }
                    }

                    // Mesclar fotos
                    for (const [key, newPhotos] of Object.entries(backupPhotos)) {
                        if (Array.isArray(newPhotos) && newPhotos.length > 0) {
                            // Carregar fotos existentes
                            let existingPhotos = await loadPhotosFromDB(key) || [];
                            
                            // Adicionar fotos que não existem (comparar por conteúdo)
                            for (const newPhoto of newPhotos) {
                                if (!existingPhotos.includes(newPhoto)) {
                                    existingPhotos.push(newPhoto);
                                    fotosAdicionadas++;
                                }
                            }
                            
                            // Salvar fotos mescladas
                            await savePhotosToDB(key, existingPhotos);
                        }
                    }

                    // Atualizar interface
                    buildTree();
                    updateProgress();
                    updateParqueProgress();

                    const resumo = [];
                    if (inspecoesAdicionadas > 0) resumo.push(`${inspecoesAdicionadas} novas`);
                    if (inspecoesAtualizadas > 0) resumo.push(`${inspecoesAtualizadas} atualizadas`);
                    if (fotosAdicionadas > 0) resumo.push(`${fotosAdicionadas} fotos`);

                    showToast(`✅ Mesclagem concluída! ${resumo.join(', ') || 'Nenhuma alteração'}`, 'success');
                    console.log('Backup mesclado com sucesso');

                } catch (error) {
                    console.error('Erro ao mesclar backup:', error);
                    showToast('❌ Erro ao mesclar backup: ' + error.message, 'error');
                }
            };

            reader.onerror = function() {
                showToast('❌ Erro ao ler arquivo', 'error');
            };

            reader.readAsText(file);
        }

                        quota: stats.quota,
                        usageFormatted: stats.usageFormatted,
                        quotaFormatted: stats.quotaFormatted,

                        <div class="diag-photos-container">
                            ${report.photos.keys.map(key => {
                                const componentName = key.replace('photos_', '').split('_').slice(1).join(' > ');
                                const aeroName = key.replace('photos_', '').split('_')[0];
                                let photosHtml = '';
                                try {
                                    const photos = JSON.parse(localStorage.getItem(key) || '[]');
                                    if (photos.length > 0) {
                                        photosHtml = `
                                            <div class="diag-photo-group">
                                                <div class="diag-photo-title">
                                                    <strong>${aeroName}</strong> - ${componentName}
                                                    <span class="diag-photo-count">(${photos.length} foto${photos.length > 1 ? 's' : ''})</span>
                                                </div>
                                                <div class="diag-photo-thumbs">
                                                    ${photos.map((photo, idx) => `
                                                        <div class="diag-thumb" onclick="openPhotoModal('${photo.replace(/'/g, "\\'")}')">
                                                            <img src="${photo}" alt="Foto ${idx + 1}">
                                                        </div>
                                                    `).join('')}
                                                </div>
                                            </div>
                                        `;
                                    }
                                } catch(e) {}
                                return photosHtml;
                            }).join('')}
                        </div>
                    ` : `
                        <div class="diag-alert info" style="margin-top: 15px;">
                            Nenhuma foto salva ainda.
                        </div>
                    `}
                </div>
                
                <!-- Estrutura -->
                <div class="diag-card">
                    <h3>🏗️ Estrutura do Sistema</h3>
                    <div class="diag-stats">
                        <div class="diag-stat">
                            <div class="diag-stat-value">${report.estrutura.totalCategorias}</div>
                            <div class="diag-stat-label">Categorias</div>
                        </div>
                        <div class="diag-stat">
                            <div class="diag-stat-value">${report.estrutura.totalComponentes}</div>
                            <div class="diag-stat-label">Componentes</div>
                        </div>
                        <div class="diag-stat">
                            <div class="diag-stat-value">${report.estrutura.totalAerogeradores}</div>
                            <div class="diag-stat-label">Aerogeradores</div>
                        </div>
                    </div>
                </div>
                
                <!-- Recomendações -->
                ${report.recommendations.length > 0 ? `
                <div class="diag-card">
                    <h3>💡 Recomendações</h3>
                    ${report.recommendations.map(r => {
                        let alertClass = 'info';
                        if (r.startsWith('❌')) alertClass = 'error';
                        else if (r.startsWith('⚠️')) alertClass = 'warning';
                        return `<div class="diag-alert ${alertClass}">${r}</div>`;
                    }).join('')}
                </div>
                ` : ''}
                
                <!-- Detalhes por Aerogerador -->
                ${report.inspectionData.byAerogerador && Object.keys(report.inspectionData.byAerogerador).length > 0 ? `
                <div class="diag-card">
                    <h3>📊 Inspeções por Aerogerador</h3>
                    <table class="diag-table">
                        <thead>
                            <tr>
                                <th>Aerogerador</th>
                                <th>Componentes</th>
                                <th>Verificados</th>
                                <th>Com Defeito</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${Object.entries(report.inspectionData.byAerogerador).map(([aero, info]) => {
                                const verificados = info.classifications['Verificado'] || 0;
                                const comDefeito = info.count - verificados;
                                return `<tr>
                                    <td><strong>${aero}</strong></td>
                                    <td>${info.count}</td>
                                    <td style="color: #28a745;">${verificados}</td>
                                    <td style="color: ${comDefeito > 0 ? '#dc3545' : '#666'};">${comDefeito}</td>
                                </tr>`;
                            }).join('')}
                        </tbody>
                    </table>
                </div>
                ` : ''}
                
                <!-- Botão Limpar Dados -->
                <div class="diag-card" style="background: #fff5f5; border: 2px solid #dc3545;">
                    <h3 style="color: #dc3545;">🗑️ Limpar Todos os Dados</h3>
                    <p style="margin: 10px 0; color: #666;">Apaga todas as inspeções e fotos. Esta ação não pode ser desfeita!</p>
                    <button onclick="confirmarLimpeza()" style="
                        background: #dc3545;
                        color: white;
                        border: none;
                        padding: 12px 25px;
                        border-radius: 8px;
                        font-size: 16px;
                        font-weight: bold;
                        cursor: pointer;
                        margin-top: 10px;
                    ">🗑️ APAGAR TUDO</button>
                </div>
            `;
            
            // Abrir modal
            openDiagnosticModal();
            
            console.log('Relatório de Diagnóstico:', report);
        }
        
        async function confirmarLimpeza() {
            if (confirm('⚠️ TEM CERTEZA?\n\nIsso vai apagar TODAS as inspeções e fotos.\n\nEsta ação NÃO pode ser desfeita!')) {
                if (confirm('🚨 ÚLTIMA CHANCE!\n\nClique OK para APAGAR TUDO.')) {
                    try {
                        await clearAllDB();
                        inspectionData = {};
                        closeDiagnosticModal();
                        alert('✅ Todos os dados foram apagados!\n\nA página será recarregada.');
                        location.reload();
                    } catch (e) {
                        alert('❌ Erro ao apagar dados: ' + e.message);
                    }
                }
            }
        }
        
        /**
         * Formata bytes para exibição legível
         */
        function formatBytes(bytes, decimals = 2) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const dm = decimals < 0 ? 0 : decimals;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(dm)) + ' ' + sizes[i];
        }

        // Iniciar aplicação quando DOM estiver pronto
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>
